<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>页面占位设计稿</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --white: #ffffff;
        --border: #e8edf5;
        --shadow: rgba(31, 50, 81, 0.08);

        --blue: #5b8cff;
        --blue-light: #dbe7ff;

        --orange: #ffb84d;
        --orange-light: #ffe3b5;

        --purple: #8d68ff;
        --purple-light: #e9deff;

        --cyan: #64d2ff;
        --green: #8ee7d3;
        --pink: #ff98aa;

        --line: #dfe8f5;
        --line-strong: #cfdcff;
        --input: #eef3fb;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(
          180deg,
          #eef3ff 0%,
          #f7f9fc 45%,
          #ffffff 100%
        );
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        color: #2d3748;
      }

      body {
        min-height: 100vh;
      }

      .app {
        min-height: 100vh;
      }

      /* 顶部栏 */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }

      .topbar-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .switcher {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .tab {
        min-width: 98px;
        height: 40px;
        padding: 0 18px;
        border-radius: 999px;
        background: var(--blue-light);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6478a6;
        font-size: 14px;
      }

      .tab.active {
        background: var(--blue);
        color: #fff;
        box-shadow: 0 8px 20px rgba(91, 140, 255, 0.28);
      }

      .right-tools {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .asset-btn {
        height: 40px;
        padding: 0 18px;
        border-radius: 14px;
        background: var(--orange);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        box-shadow: 0 8px 18px rgba(255, 184, 77, 0.25);
      }

      .points-box {
        height: 40px;
        padding: 0 14px;
        border-radius: 14px;
        background: var(--purple-light);
        display: flex;
        align-items: center;
        gap: 10px;
        color: #7a57d1;
        font-weight: 600;
      }

      .points-icon {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--purple);
      }

      .avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: var(--cyan);
        box-shadow: 0 8px 18px rgba(100, 210, 255, 0.28);
        flex-shrink: 0;
      }

      /* 主体内容 */
      .main {
        padding: 28px 20px 160px;
      }

      .list {
        max-width: 860px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .item {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 18px;
        display: flex;
        align-items: center;
        gap: 16px;
        box-shadow: 0 12px 34px var(--shadow);
      }

      .thumb {
        width: 58px;
        height: 58px;
        border-radius: 18px;
        background: var(--green);
        flex: 0 0 auto;
      }

      .content {
        flex: 1;
        min-width: 0;
      }

      .line {
        height: 14px;
        border-radius: 999px;
        background: var(--line);
        margin-bottom: 12px;
      }

      .line.title {
        background: #8cacff;
      }

      .line.small {
        height: 12px;
        margin-bottom: 0;
        background: var(--line-strong);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 0 0 auto;
      }

      .pill {
        width: 70px;
        height: 30px;
        border-radius: 999px;
        background: var(--orange-light);
      }

      .dot {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: var(--pink);
      }

      /* 每个卡片换点颜色，避免太单调 */
      .item:nth-child(2) .thumb {
        background: #ffd39c;
      }
      .item:nth-child(3) .thumb {
        background: #b7d7ff;
      }
      .item:nth-child(4) .thumb {
        background: #d3b3ff;
      }
      .item:nth-child(5) .thumb {
        background: #9de5b1;
      }
      .item:nth-child(6) .thumb {
        background: #ffb7d1;
      }
      .item:nth-child(7) .thumb {
        background: #9ed8ff;
      }
      .item:nth-child(8) .thumb {
        background: #ffe29b;
      }

      .item:nth-child(even) .pill {
        background: #cfe1ff;
      }
      .item:nth-child(even) .dot {
        background: #7dd3fc;
      }
      .item:nth-child(3n) .dot {
        background: #c084fc;
      }

      /* 底部固定对话框 */
      .composer-wrap {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 18px;
        z-index: 60;
        padding: 0 16px;
      }

      .composer {
        width: min(860px, calc(100vw - 32px));
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(16px);
        border: 1px solid var(--border);
        border-radius: 26px;
        padding: 14px;
        box-shadow: 0 18px 45px rgba(31, 50, 81, 0.14);
      }

      .composer-top {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .window-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      .window-dot.red {
        background: #ff8e8e;
      }
      .window-dot.yellow {
        background: #ffd36b;
      }
      .window-dot.green {
        background: #76e4a2;
      }

      .composer-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .tool {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        background: #bdd8ff;
        flex: 0 0 auto;
      }

      .input-area {
        flex: 1;
        min-width: 0;
        height: 56px;
        border-radius: 18px;
        background: var(--input);
        display: flex;
        align-items: center;
        padding: 0 16px;
      }

      .input-line {
        width: 58%;
        height: 14px;
        border-radius: 999px;
        background: #c9d8ee;
      }

      .send {
        width: 72px;
        height: 48px;
        border-radius: 16px;
        background: var(--blue);
        flex: 0 0 auto;
        box-shadow: 0 8px 18px rgba(91, 140, 255, 0.28);
      }

      /* 响应式 */
      @media (max-width: 768px) {
        .topbar-inner {
          padding: 12px 16px;
        }

        .tab {
          min-width: 84px;
          height: 38px;
          padding: 0 14px;
          font-size: 13px;
        }

        .asset-btn,
        .points-box {
          height: 38px;
        }

        .main {
          padding: 20px 16px 152px;
        }

        .item {
          padding: 16px;
        }

        .thumb {
          width: 52px;
          height: 52px;
        }
      }

      @media (max-width: 560px) {
        .topbar-inner {
          flex-direction: column;
          align-items: stretch;
        }

        .right-tools {
          justify-content: flex-end;
        }

        .item {
          align-items: flex-start;
        }

        .actions {
          flex-direction: column;
        }

        .pill {
          width: 56px;
        }

        .send {
          width: 58px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- 顶部 -->
      <header class="topbar">
        <div class="topbar-inner">
          <div class="switcher">
            <div class="tab active">切换一</div>
            <div class="tab">切换二</div>
            <div class="tab">切换三</div>
          </div>

          <div class="right-tools">
            <div class="asset-btn">资产</div>
            <div class="points-box">
              <div class="points-icon"></div>
              <span>积分</span>
            </div>
            <div class="avatar"></div>
          </div>
        </div>
      </header>

      <!-- 列表 -->
      <main class="main">
        <section class="list">
          <div class="item">
            <div class="thumb"></div>
            <div class="content">
              <div class="line title" style="width: 52%"></div>
              <div class="line" style="width: 78%"></div>
              <div class="line small" style="width: 34%"></div>
            </div>
            <div class="actions">
              <div class="pill"></div>
              <div class="dot"></div>
            </div>
          </div>

          <div class="item">
            <div class="thumb"></div>
            <div class="content">
              <div class="line title" style="width: 44%"></div>
              <div class="line" style="width: 70%"></div>
              <div class="line small" style="width: 28%"></div>
            </div>
            <div class="actions">
              <div class="pill"></div>
              <div class="dot"></div>
            </div>
          </div>

          <div class="item">
            <div class="thumb"></div>
            <div class="content">
              <div class="line title" style="width: 58%"></div>
              <div class="line" style="width: 74%"></div>
              <div class="line small" style="width: 36%"></div>
            </div>
            <div class="actions">
              <div class="pill"></div>
              <div class="dot"></div>
            </div>
          </div>

          <div class="item">
            <div class="thumb"></div>
            <div class="content">
              <div class="line title" style="width: 48%"></div>
              <div class="line" style="width: 82%"></div>
              <div class="line small" style="width: 31%"></div>
            </div>
            <div class="actions">
              <div class="pill"></div>
              <div class="dot"></div>
            </div>
          </div>

          <div class="item">
            <div class="thumb"></div>
            <div class="content">
              <div class="line title" style="width: 55%"></div>
              <div class="line" style="width: 76%"></div>
              <div class="line small" style="width: 42%"></div>
            </div>
            <div class="actions">
              <div class="pill"></div>
              <div class="dot"></div>
            </div>
          </div>

          <div class="item">
            <div class="thumb"></div>
            <div class="content">
              <div class="line title" style="width: 40%"></div>
              <div class="line" style="width: 68%"></div>
              <div class="line small" style="width: 26%"></div>
            </div>
            <div class="actions">
              <div class="pill"></div>
              <div class="dot"></div>
            </div>
          </div>

          <div class="item">
            <div class="thumb"></div>
            <div class="content">
              <div class="line title" style="width: 50%"></div>
              <div class="line" style="width: 73%"></div>
              <div class="line small" style="width: 33%"></div>
            </div>
            <div class="actions">
              <div class="pill"></div>
              <div class="dot"></div>
            </div>
          </div>

          <div class="item">
            <div class="thumb"></div>
            <div class="content">
              <div class="line title" style="width: 46%"></div>
              <div class="line" style="width: 80%"></div>
              <div class="line small" style="width: 30%"></div>
            </div>
            <div class="actions">
              <div class="pill"></div>
              <div class="dot"></div>
            </div>
          </div>
        </section>
      </main>

      <!-- 底部固定对话框 -->
      <div class="composer-wrap">
        <div class="composer">
          <div class="composer-top">
            <div class="window-dot red"></div>
            <div class="window-dot yellow"></div>
            <div class="window-dot green"></div>
          </div>

          <div class="composer-row">
            <div class="tool"></div>
            <div class="input-area">
              <div class="input-line"></div>
            </div>
            <div class="send"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
